# true color — matches Ghostty palette
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# focus events (keeps fish shell integration working)
set -g focus-events on

# clipboard (Ghostty has clipboard-read/write = allow)
set -g set-clipboard on

# mouse
set -g mouse on

# extended keys (modern keyboard protocol)
set -g extended-keys on

# image passthrough (Ghostty supports sixel/kitty protocol)
set -g allow-passthrough on
